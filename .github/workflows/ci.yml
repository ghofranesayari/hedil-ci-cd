name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  MIN_COVERAGE: "20"
  D3_MIN_MICRO_F1: "0.65"

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Preflight quick
        shell: pwsh
        run: |
          python scripts/preflight.py --quick

  quality-gates:
    name: quality-gates (ubuntu)
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock

      - name: Prepare CI temp directories
        shell: pwsh
        run: |
          $ciRoot = Join-Path $env:RUNNER_TEMP 'aebm'
          $coverageFile = Join-Path $ciRoot '.coverage'
          $pytestBaseTemp = Join-Path $ciRoot 'pytest-tmp'
          $pytestCacheDir = Join-Path $ciRoot 'pytest-cache'
          New-Item -ItemType Directory -Force -Path $ciRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $pytestBaseTemp | Out-Null
          New-Item -ItemType Directory -Force -Path $pytestCacheDir | Out-Null
          "COVERAGE_FILE=$coverageFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYTEST_BASETEMP=$pytestBaseTemp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYTEST_CACHE_DIR=$pytestCacheDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run D1 tests with coverage gate
        shell: pwsh
        run: |
          python -m pytest -c pytest.ini tests_d1 --basetemp "$env:PYTEST_BASETEMP" -o "cache_dir=$env:PYTEST_CACHE_DIR" --cov=src --cov=ui --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=${{ env.MIN_COVERAGE }} -q

      - name: Run D3 quality gate
        shell: pwsh
        run: |
          python scripts/eval_d3.py --enforce-gate --min-micro-f1 ${{ env.D3_MIN_MICRO_F1 }}

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            coverage.xml
            outputs/evaluation/d3/**/*.json
          if-no-files-found: ignore
